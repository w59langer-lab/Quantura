<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6F1E7"/>
      <stop offset="0.45" stop-color="#F1E8D8"/>
      <stop offset="1" stop-color="#E8E2D4"/>
    </linearGradient>

    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F8A4C" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#1F8A4C" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="redGlow" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C63B36" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#C63B36" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="goldGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C8A85A" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#C8A85A" stop-opacity="0"/>
    </linearGradient>

    <filter id="blur40" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <filter id="blur90" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="90"/>
    </filter>

    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" stroke="#ffffff" stroke-opacity="0.11" stroke-width="1"/>
    </pattern>

    <linearGradient id="waveStroke" x1="250" y1="220" x2="1680" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.22"/>
    </linearGradient>

    <linearGradient id="ribbonLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E8A4A" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#1E8A4A" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="ribbonMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.10"/>
    </linearGradient>

    <linearGradient id="ribbonRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#C63B36" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#C63B36" stop-opacity="0.16"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- soft ambient glows -->
  <ellipse cx="300" cy="250" rx="340" ry="240" fill="url(#greenGlow)" filter="url(#blur90)"/>
  <ellipse cx="1660" cy="260" rx="360" ry="260" fill="url(#redGlow)" filter="url(#blur90)"/>
  <ellipse cx="980" cy="880" rx="560" ry="220" fill="url(#goldGlow)" filter="url(#blur90)"/>

  <!-- subtle structure -->
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- flowing lines -->
  <path d="M-40 818C185 744 286 674 487 670C690 666 741 752 960 746C1192 740 1286 590 1501 580C1672 572 1805 630 1960 694" stroke="url(#waveStroke)" stroke-width="4" stroke-linecap="round"/>
  <path d="M-20 896C176 806 366 770 550 796C703 818 824 888 996 888C1180 888 1303 804 1468 768C1640 730 1784 758 1964 842" stroke="url(#waveStroke)" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M130 274C306 194 525 188 693 246C822 290 918 372 1083 388C1254 404 1388 346 1521 286C1657 224 1780 200 1910 218" stroke="url(#waveStroke)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- left-bottom Italian-inspired ribbon -->
  <g opacity="0.95">
    <path d="M0 934C191 882 322 858 492 868C658 878 792 916 960 988V1080H0V934Z" fill="url(#ribbonLeft)"/>
    <path d="M180 978C360 938 550 938 738 978C846 1001 916 1029 1010 1080H180V978Z" fill="url(#ribbonMid)"/>
    <path d="M520 924C713 894 916 912 1088 982C1170 1016 1236 1048 1310 1080H520V924Z" fill="url(#ribbonRight)"/>
  </g>

  <!-- elegant soft circles -->
  <circle cx="1460" cy="780" r="150" fill="#FFFFFF" fill-opacity="0.14"/>
  <circle cx="1460" cy="780" r="112" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="2"/>
  <circle cx="1540" cy="710" r="48" fill="#1E8A4A" fill-opacity="0.10"/>
  <circle cx="1378" cy="862" r="58" fill="#C63B36" fill-opacity="0.09"/>

  <circle cx="408" cy="412" r="98" fill="#FFFFFF" fill-opacity="0.12"/>
  <circle cx="408" cy="412" r="70" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2"/>
  <circle cx="348" cy="340" r="32" fill="#1E8A4A" fill-opacity="0.10"/>
  <circle cx="486" cy="474" r="36" fill="#C63B36" fill-opacity="0.08"/>

  <!-- translucent card-safe center zone -->
  <rect x="310" y="180" width="1300" height="720" rx="34" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16"/>

  <!-- corner accents -->
  <path d="M0 0H420C256 70 140 176 72 332C36 414 16 502 0 612V0Z" fill="#FFFFFF" fill-opacity="0.10"/>
  <path d="M1920 0H1510C1648 60 1752 152 1824 278C1868 356 1897 446 1920 548V0Z" fill="#FFFFFF" fill-opacity="0.08"/>

  <!-- tiny floating light spots -->
  <g filter="url(#blur40)">
    <circle cx="764" cy="222" r="22" fill="#FFFFFF" fill-opacity="0.35"/>
    <circle cx="1132" cy="282" r="18" fill="#FFFFFF" fill-opacity="0.28"/>
    <circle cx="1284" cy="612" r="20" fill="#FFFFFF" fill-opacity="0.24"/>
    <circle cx="632" cy="714" r="24" fill="#FFFFFF" fill-opacity="0.20"/>
  </g>
</svg>
