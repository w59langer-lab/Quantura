<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Level 5 – Zwei-Schritt-Aufgaben</title>
  <link rel="stylesheet" href="../core/styles.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <div id="welcome"></div>
    <section class="level-info-card">
      <h2>Level 5 – Zwei-Schritt-Aufgaben</h2>
      <p>Plus und Minus in einer Aufgabe kombinieren</p>
      <label class="time-mode-toggle">
        <input type="checkbox" id="timeModeToggle">
        Zeitmodus (5 Minuten gesamt)
      </label>
      <p class="time-mode-note">Bonus: +2 Punkte pro gesparter Minute.</p>
      <div id="timerBox" class="timer-box" hidden>
        <span class="hourglass" aria-hidden="true">⏳</span>
        <span id="timerText">05:00</span>
      </div>
    </section>

    <div id="tasks"></div>
    <p id="loadError" class="load-error" hidden>Aufgaben konnten nicht geladen werden.</p>
  </main>
  <div id="footer-placeholder"></div>
  <script src="../core/scripts.js" defer></script>
  <script src="../../../assets/js/header-widgets.js" defer></script>
</body>
</html>
