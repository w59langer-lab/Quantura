<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sprachführer wählen</title>
  <link rel="stylesheet" href="/core/assets/style.css" />
  <script src="/core/js/core_init.js" defer></script>
  <style>
    main.page-wrapper{ max-width:1080px; margin: 0 auto; padding: 28px 16px 44px; }
    h1{ margin: 0 0 8px; }
    p.lead{ margin:0 0 22px; color:#2d3547; font-size:15px; }
    .sf-grid{ display:grid; gap:18px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .sf-card{
      display:flex; flex-direction:column; justify-content:center;
      gap:8px; padding:18px 20px; border-radius:18px;
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.16);
      box-shadow: 0 14px 36px rgba(0,0,0,.18);
      text-decoration:none; color:inherit;
      transition: transform .08s ease, border-color .12s ease, background .12s ease, box-shadow .12s ease;
      min-height:130px;
    }
    .sf-card:hover,.sf-card:focus-visible{
      transform: translateY(-2px);
      border-color: rgba(122,167,255,.45);
      background: rgba(122,167,255,.10);
      box-shadow:0 20px 48px rgba(0,0,0,.36);
      outline:none;
    }
    .sf-card:active{ transform: translateY(0); }
    .sf-card .top{ font-size:21px; font-weight:800; letter-spacing:.2px; color:#0f172a; }
    .sf-card .sub{ font-size:14px; color:#1f2937; }
    .sf-flags{
      display:flex; gap:8px; align-items:center;
      min-height:22px;
    }
    .sf-flag{ display:inline-flex; align-items:center; justify-content:center; width:28px; height:20px; border-radius:4px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.2); background:#dce2ed; }
    .sf-flag svg{ width:100%; height:100%; display:block; }
    .sf-badge{ display:inline-flex; gap:6px; align-items:center; font-size:12px; color:#374151; }
    .sf-badge .dot{ width:8px; height:8px; border-radius:999px; background:#5c8df6; display:inline-block; }
    @media(max-width:640px){ .sf-card{min-height:120px; padding:16px;} }
  </style>
</head>
<body>
  <div data-partial="header" data-partial-path="/core/partials/header.html"></div>
  <main class="page-wrapper">
    <div class="card">
      <h1>Sprachführer wählen</h1>
      <p class="lead">Wähle eine Sprachpaar-Karte, um den passenden Sprachführer zu öffnen.</p>
      <div id="sfGrid" class="sf-grid" aria-label="Sprachführer-Auswahl"></div>
    </div>
  </main>
  <div data-partial="footer" data-partial-path="/core/partials/footer.html"></div>
  <style>
    /* Footer-Schrift dunkler für bessere Lesbarkeit auf hellem Grund */
    .site-footer, .site-footer * { color:#0f1626 !important; text-shadow:none !important; }
  </style>
  <script>
    const flagSvgs = {
      de: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#ffce00"/><rect width="3" height="1.333" y="0.667" fill="#dd0000"/><rect width="3" height="0.667" fill="#000000"/></svg>`,
      gb: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30"><clipPath id="t"><path d="M30,15 h30 v15 h-30 v15 h-30 v-15 h-30 v-15 h30 v-15 h30 z"/></clipPath><path d="M0 0h60v30h-60z" fill="#012169"/><path d="M0 0l60 30m0-30l-60 30" stroke="#fff" stroke-width="6"/><path d="M0 0l60 30m0-30l-60 30" stroke="#c8102e" stroke-width="4" clip-path="url(#t)"/><path d="M30 0v30M0 15h60" stroke="#fff" stroke-width="10"/><path d="M30 0v30M0 15h60" stroke="#c8102e" stroke-width="6"/></svg>`,
      it: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#008c45"/><rect width="1" height="2" x="1" fill="#ffffff"/><rect width="1" height="2" x="2" fill="#cd212a"/></svg>`,
      es: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#aa151b"/><rect width="3" height="1.2" y="0.4" fill="#f1bf00"/></svg>`,
      fr: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="1" height="2" fill="#0055a4"/><rect width="1" height="2" x="1" fill="#ffffff"/><rect width="1" height="2" x="2" fill="#ef4135"/></svg>`,
      ru: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2"><rect width="3" height="2" fill="#d52b1e"/><rect width="3" height="1.333" y="0.667" fill="#0039a6"/><rect width="3" height="0.667" fill="#ffffff"/></svg>`
    };
    const items = [
      { id: "de-en", title: "Deutsch ⇄ English", sub: "German ⇄ English", flagCodes: ["de","gb"], href: "/pages/language_lab/apps/SprachBox_DE_EN_Leitner_PWA/talk_leitner_pwa/index.html", enabled: true },
      { id: "de-it", title: "Deutsch ⇄ Italiano", sub: "Tedesco ⇄ Italiano", flagCodes: ["de","it"], href: "/pages/language_lab/apps/SprachBox_DE_IT_Leitner_PWA/talk_leitner_pwa/index.html", enabled: true },
      { id: "de-es", title: "Deutsch ⇄ Español", sub: "Alemán ⇄ Español", flagCodes: ["de","es"], href: "/pages/language_lab/apps/SprachBox_DE_ES_Leitner_PWA/talk_leitner_pwa/index.html", enabled: true },
      { id: "de-fr", title: "Deutsch ⇄ Français", sub: "Allemand ⇄ Français", flagCodes: ["de","fr"], href: "/pages/language_lab/apps/SprachBox_DE_FR_Leitner_PWA/talk_leitner_pwa/index.html", enabled: true },
      { id: "de-ru", title: "Deutsch ⇄ Русский", sub: "Немецкий ⇄ Русский", flagCodes: ["de","ru"], href: "/pages/language_lab/apps/SprachBox_DE_RU_Leitner_PWA/talk_leitner_pwa/index.html", enabled: true },
    ];
    const grid = document.getElementById("sfGrid");
    items.filter(x => x.enabled).forEach(item => {
      const a = document.createElement("a");
      a.className = "sf-card";
      a.href = item.href;
      const flagsHtml = (item.flagCodes || []).map(code => `<span class="sf-flag" aria-hidden="true">${flagSvgs[code] || ""}</span>`).join("");
      a.innerHTML = `
        <div class="sf-flags" aria-label="${item.title} Flaggen">${flagsHtml}</div>
        <div class="top">${item.title}</div>
        <div class="sub">${item.sub}</div>
        <div class="sf-badge"><span class="dot"></span><span>${item.id.toUpperCase()}</span></div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
